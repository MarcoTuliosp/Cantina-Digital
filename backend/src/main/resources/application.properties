# ═══════════════════════════════════════════
# Cantina Digital API — Configuração Cloud
# ═══════════════════════════════════════════

# Server
server.port=${PORT:8080}

# Database (PostgreSQL — Neon Cloud)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/cantina_db}
spring.datasource.username=${DATABASE_USER:cantina_admin}
spring.datasource.password=${DATABASE_PASSWORD:cantina_db_pass_123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexões (otimizado para free tier)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS — Origens permitidas (separar por vírgula)
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Logging
logging.level.com.cantina=INFO
logging.level.org.hibernate.SQL=WARN
